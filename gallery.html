<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Client Gallery</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; color: white; font-family: -apple-system, sans-serif; }
    
    .landing-page { padding: 20px; text-align: center; max-width: 800px; margin: 0 auto; }
    
    .header-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 25px; }
    .header-container h2 { font-size: 24px; font-weight: 600; margin: 0; color: #fff; }
    .share-btn { background: #2a2a2a; color: white; border: 1px solid #444; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
    .share-btn:active { background: #444; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .modal-box { background: #222; border-radius: 20px; padding: 25px; width: 85%; max-width: 320px; display: flex; flex-direction: column; align-items: center; gap: 12px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .modal-box h3 { margin: 0 0 5px 0; font-size: 18px; }
    .qr-container { background: white; padding: 10px; border-radius: 12px; margin-bottom: 5px; }
    .action-btn { background: #4285f4; color: white; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .action-btn:active { opacity: 0.8; transform: scale(0.98); }
    .close-btn { background: transparent; color: #aaa; width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #555; font-weight: bold; cursor: pointer; margin-top: 5px; }

    .thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 30px; }
    .thumb-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid #333; background: #222; }
    
    .loader-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 60px; gap: 15px; width: 100%; }
    .focus-ring { width: 44px; height: 44px; border: 3px solid rgba(66, 133, 244, 0.15); border-top: 3px solid #4285f4; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite; }
    .loader-text { color: #aaa; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; animation: pulse-text 1.5s ease-in-out infinite; }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulse-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: #000; z-index: 9999; display: none; flex-direction: column; align-items:center; justify-content:center; overflow:hidden; }
    .popout-close { position: absolute; top: max(40px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); width: 44px; height: 44px; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 99999; color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.4); } 
    .download-action { position: absolute; top: max(40px, env(safe-area-inset-top)); left: max(20px, env(safe-area-inset-left)); height: 44px; padding: 0 20px; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: bold; z-index: 99999; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.4); transition: all 0.2s; }
    
    .image-stage { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; } 
    
    img.main { width: 85%; height: 85%; transition: opacity 0.3s ease; opacity:0; object-fit: contain; pointer-events: auto; -webkit-touch-callout: default; } 
    
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 10; color: #fff; cursor: pointer; } 
    .left { left: max(10px, env(safe-area-inset-left)); } .right { right: max(10px, env(safe-area-inset-right)); } 
    .modal-bottom-controls { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 20; padding-top: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); } 
    .filmstrip-wrapper { position: relative; width: 100%; overflow-x: auto; white-space: nowrap; -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); padding: 10px calc(50% - 26px); scroll-snap-type: x mandatory; box-sizing: border-box; } 
    .filmstrip-wrapper::-webkit-scrollbar { display: none; } 
    .filmstrip-thumb { width: 45px; height: 45px; object-fit: cover; display: inline-block; margin: 0 4px; border-radius: 6px; opacity: 0.4; border: 2px solid transparent; transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); scroll-snap-align: center; background-color: #222; cursor: pointer; transform-origin: center center; } 
    .filmstrip-thumb.active { opacity: 1; transform: scale(1.25); border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.4); z-index: 2; position: relative; } 
    .scrubber-track { width: 90%; max-width: 500px; height: 50px; display: flex; align-items: center; position: relative; touch-action: none; } 
    .track-line { width: 100%; height: 4px; background: #444; border-radius: 2px; } 
    .scrubber-handle { width: 24px; height: 24px; background: #fff; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 2px 8px rgba(0,0,0,0.6); pointer-events: none; } 
    .time-bubble { position: absolute; top: -30px; transform: translateX(-50%); background: #333; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 0.2s; }

    /* New Hint Banner CSS */
    .hint-banner { 
      position: absolute; 
      bottom: 30px; 
      left: 50%; 
      transform: translateX(-50%); 
      width: fit-content; 
      max-width: 90%; 
      font-size: 14px; 
      text-align: center; 
      font-weight: bold; 
      background: rgba(0,0,0,0.85); 
      padding: 10px 20px; 
      border-radius: 30px; 
      z-index: 100; 
      backdrop-filter: blur(10px); 
      border: 1px solid rgba(255,255,255,0.2); 
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: opacity 0.3s ease-in-out; 
      pointer-events: none; 
      opacity: 0; 
    }
  </style>
</head>
<body>

  <div class="landing-page">
    <div class="header-container">
      <h2>Your gallery</h2>
      <button class="share-btn" onclick="openShareModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        Share
      </button>
    </div>
    
    <div id="loader" class="loader-wrapper">
      <div class="focus-ring"></div>
      <div class="loader-text">Fetching Photos</div>
    </div>
    <div id="thumb-grid" class="thumb-grid"></div>
  </div>

  <div id="shareModal" class="modal-overlay" onclick="closeShareModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3>Share this Gallery</h3>
      <div class="qr-container">
        <div id="share-qr-code"></div>
      </div>
      <button class="action-btn" id="qr-dl-btn" style="background: #0f9d58;" onclick="downloadQR()">⬇️ Download QR Code</button>
      <button class="action-btn" id="copy-btn" onclick="copyLink()">📋 Copy Link</button>
      <button class="close-btn" onclick="closeShareModal()">Close</button>
    </div>
  </div>

  <div id="lightbox" class="lightbox">
    <a id="l-download-btn" class="download-action" href="" download>⬇ Download</a>
    <div class="popout-close" onclick="closeLightbox()">✕</div>
    
    <div class="image-stage" id="l-stage">
      <div id="hd-hint" class="hint-banner"></div> <div class="nav-btn left" onclick="navigateInline(-1)">&#10094;</div>
      <img id="l-img" class="main" src="" onload="this.style.opacity=1">
      <div class="nav-btn right" onclick="navigateInline(1)">&#10095;</div>
    </div>
    
    <div class="modal-bottom-controls">
      <div id="l-count" style="font-size:12px; color:#aaa; font-weight:bold;"></div>
      <div class="filmstrip-wrapper" id="l-filmstripWrapper"></div>
      <div class="scrubber-track" id="l-track">
        <div class="time-bubble" id="l-time"></div>
        <div class="track-line"></div>
        <div class="scrubber-handle" id="l-handle"></div>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const SESSION_NUM = urlParams.get('session');
    const PHOTO_ID = urlParams.get('photo'); // Grab the single photo ID if it exists
    const FOLDER_ID = urlParams.get('folderId'); // Grab the folder ID needed for sessions
    const DYNAMIC_BACKEND = urlParams.get('backend'); 
    
    // IMPORTANT: Set this to your Apps Script Web App URL
    const GAS_WEB_APP_URL = DYNAMIC_BACKEND ? DYNAMIC_BACKEND : "https://script.google.com/macros/s/AKfycbzEUz2hwAYe3V5im0_jExevNjKGKUYzZqkJhVMCOWPy8TpvpYW_oIGYQEvJLbXd0dTQ/exec"; 
    
    window.filteredImages = [];
    var inlineIdx = 0;            
    var lIsProgrammatic = false;
    var imageLoadTimer = null; 
    var hdLoadTimer = null; 
    var isUserTouching = false; 
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // New variables and function for the hint logic
    var hintTimer = null;

    function showHint(msg, persist = false) {
      const h = document.getElementById('hd-hint');
      if (!h) return;
      h.innerText = msg; h.style.opacity = '1';
      clearTimeout(hintTimer);
      if (!persist) {
        hintTimer = setTimeout(() => { 
          h.style.opacity = '0'; 
          setTimeout(() => { if(h.style.opacity === '0') h.innerText = ''; }, 300);
        }, 5000);
      }
    }

    window.onload = function() {
      // 1. Check if we have AT LEAST a session or a single photo ID
      if (!SESSION_NUM && !PHOTO_ID) {
        document.getElementById('loader').innerHTML = "<div class='loader-text'>No session or photo specified</div>";
        document.querySelector('.share-btn').style.display = 'none';
        return;
      }

      // 2. Build the correct fetch URL depending on what the user clicked
      let fetchUrl = "";
      if (SESSION_NUM) {
        if (!FOLDER_ID) {
            document.getElementById('loader').innerHTML = "<div class='loader-text' style='color:#ea4335;'>Error: Missing folderId in URL</div>";
            return;
        }
        // Send session request WITH folderId
        fetchUrl = `${GAS_WEB_APP_URL}?api=gallery&session=${SESSION_NUM}&folderId=${FOLDER_ID}`;
      } else if (PHOTO_ID) {
        // Send single photo request
        fetchUrl = `${GAS_WEB_APP_URL}?api=photo&id=${PHOTO_ID}`;
        // Hide the share button for single photos if you want a cleaner UI
        document.querySelector('.share-btn').style.display = 'none'; 
      }

      if (isIOS) {
        // iOS Main Lightbox hint
        const dlBtn = document.getElementById('l-download-btn');
        dlBtn.removeAttribute('href');
        dlBtn.removeAttribute('download');
        dlBtn.innerText = "Long press the image then Save to Photos";
        dlBtn.style.pointerEvents = "none";
        dlBtn.style.fontSize = "13px";
        dlBtn.style.background = "rgba(0,0,0,0.65)";
        dlBtn.style.border = "none";
        dlBtn.style.left = "50%";
        dlBtn.style.transform = "translateX(-50%)";
        dlBtn.style.whiteSpace = "nowrap";
        dlBtn.style.height = "36px";
        dlBtn.style.padding = "0 16px";

        // iOS Share Modal QR hint 
        const qrDlBtn = document.getElementById('qr-dl-btn');
        qrDlBtn.removeAttribute('onclick');
        qrDlBtn.innerText = "Long press QR image and Save to Photos";
        qrDlBtn.style.background = "transparent";
        qrDlBtn.style.color = "#aaa";
        qrDlBtn.style.pointerEvents = "none";
        qrDlBtn.style.fontSize = "13px";
        qrDlBtn.style.padding = "0";
        qrDlBtn.style.height = "auto";
        qrDlBtn.style.margin = "-5px 0 5px 0"; 
      }

      // 3. Fire the request!
      fetch(fetchUrl)
        .then(response => response.json())
        .then(result => {
          if (result.status === 'success') {
            // Because the backend returns single photos as a 1-item array,
            // setupLandingPage handles it perfectly without any extra code!
            setupLandingPage(result.data);
          } else {
            document.getElementById('loader').innerHTML = "<div class='loader-text' style='color:#ea4335;'>Error: " + result.message + "</div>";
          }
        })
        .catch(err => {
          document.getElementById('loader').innerHTML = "<div class='loader-text' style='color:#ea4335;'>Failed to load photos</div>";
          console.error(err);
        });

      setupInlineTouch(); 
    };

    function setupLandingPage(photos) {
      document.getElementById('loader').style.display = 'none';
      if (!photos || photos.length === 0) {
        document.getElementById('thumb-grid').innerHTML = "<div class='loader-wrapper'><div class='loader-text'>No photos ready yet. Check back soon!</div></div>";
        return;
      }

      window.filteredImages = photos.map(function(p) { return { baseUrl: p.baseUrl, displayTime: p.displayTime, downloadUrl: p.downloadUrl }; });

      var gridHtml = "";
      photos.forEach(function(p, index) { 
        gridHtml += "<img src='" + p.previewUrl + "' loading='lazy' decoding='async' onclick='openInlineCarousel(" + index + ")' style='cursor:pointer; transition: opacity 0.2s;' onmouseover='this.style.opacity=0.8' onmouseout='this.style.opacity=1'>"; 
      });
      document.getElementById('thumb-grid').innerHTML = gridHtml;

      // ---> NEW: Auto-open lightbox for single photos <---
      if (PHOTO_ID && photos.length === 1) {
        setTimeout(() => {
          openInlineCarousel(0);
          
          // Clean up the UI for single photos (hide filmstrip and scrubber)
          document.getElementById('l-count').style.display = 'none';
          document.getElementById('l-filmstripWrapper').style.display = 'none';
          document.getElementById('l-track').style.display = 'none';
        }, 50); // Small delay ensures the DOM is ready
      } else {
        // Ensure UI elements remain visible for full session galleries
        document.getElementById('l-count').style.display = 'block';
        document.getElementById('l-filmstripWrapper').style.display = 'block';
        document.getElementById('l-track').style.display = 'flex';
      }
    }

    let qrGenerated = false;
    
    function openShareModal() {
      document.getElementById('shareModal').style.display = 'flex';
      if (!qrGenerated) {
        new QRCode(document.getElementById("share-qr-code"), {
          text: window.location.href, 
          width: 160, height: 160, correctLevel: QRCode.CorrectLevel.L
        });
        qrGenerated = true;

        if (isIOS) {
          setTimeout(() => {
            const qrContainer = document.getElementById('share-qr-code');
            const canvas = qrContainer.querySelector('canvas');
            const img = qrContainer.querySelector('img');
            if (canvas && img) {
              img.src = canvas.toDataURL("image/png");
              img.style.display = "block";
              canvas.style.display = "none";
            }
          }, 50);
        }
      }
    }

    function closeShareModal() { document.getElementById('shareModal').style.display = 'none'; }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('copy-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = "✓ Link Copied!";
        btn.style.background = "#2b2b2b"; 
        setTimeout(() => { btn.innerHTML = originalText; btn.style.background = "#4285f4"; }, 2000);
      });
    }

    function downloadQR() {
      const qrContainer = document.getElementById('share-qr-code');
      const canvas = qrContainer.querySelector('canvas');
      const img = qrContainer.querySelector('img');
      let url = canvas ? canvas.toDataURL("image/png") : (img ? img.src : '');
      
      if (url) {
        const a = document.createElement('a');
        a.href = url;
        a.download = `Gallery-QR-${SESSION_NUM || 'Share'}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    }

    function openInlineCarousel(idx) {
      inlineIdx = idx;
      document.getElementById('lightbox').style.display = 'flex';
      
      var stripHtml = '';
      window.filteredImages.forEach((f, i) => { 
        var src = f.baseUrl.startsWith('data:') ? f.baseUrl : f.baseUrl + '=s50-c';
        stripHtml += '<img id="lt-'+i+'" class="filmstrip-thumb ' + (i === idx ? 'active' : '') + '" src="'+src+'" loading="lazy" decoding="async" onclick="navigateInlineTo('+i+')">'; 
      });
      document.getElementById('l-filmstripWrapper').innerHTML = stripHtml;
      
      navigateInlineTo(idx);
      setTimeout(() => { 
        var itl = document.getElementById('lt-' + idx); 
        if (itl) itl.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); 
      }, 50);
    }

    function navigateInlineTo(idx, fromFilmstripScroll = false) {
      if (idx < 0 || idx >= window.filteredImages.length) return;
      inlineIdx = idx;
      const img = window.filteredImages[idx];
      
      const pct = window.filteredImages.length > 1 ? (idx / (window.filteredImages.length - 1)) * 100 : 0;
      
      document.getElementById('l-handle').style.left = pct + '%'; 
      var timeB = document.getElementById('l-time');
      timeB.style.left = pct + '%'; timeB.innerText = img.displayTime; 
      document.getElementById('l-count').innerText = `${idx + 1} / ${window.filteredImages.length}`; 
      
      if (!isIOS) {
        document.getElementById('l-download-btn').href = img.downloadUrl;
      }
      
      document.querySelectorAll('#l-filmstripWrapper .filmstrip-thumb.active').forEach(el => el.classList.remove('active')); 
      const active = document.getElementById('lt-' + idx); 
      
      if (active) { 
        active.classList.add('active'); 
        if (!fromFilmstripScroll) {
          lIsProgrammatic = true; 
          document.getElementById('l-filmstripWrapper').style.scrollBehavior = 'auto'; 
          active.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); 
          setTimeout(() => { lIsProgrammatic = false; }, 150); 
        }
      }
      
      // Updated HD Hint loading logic starts here
      clearTimeout(imageLoadTimer);
      clearTimeout(hdLoadTimer);
      clearTimeout(hintTimer);
      const hintEl = document.getElementById('hd-hint');
      if (hintEl) hintEl.style.opacity = '0';
      
      const w1024Url = img.baseUrl.startsWith('data:') ? img.baseUrl : img.baseUrl + '=w1024';
      const hdUrl = img.baseUrl.startsWith('data:') ? img.baseUrl : img.baseUrl + '=s0';
      const imgEl = document.getElementById('l-img');
      
      imageLoadTimer = setTimeout(() => {
        if (imgEl.src !== w1024Url && imgEl.src !== hdUrl) {
          imgEl.style.opacity = 0; 
          setTimeout(() => { 
            imgEl.src = w1024Url; 
            imgEl.onload = () => {
              imgEl.style.opacity = 1; 
              
              hdLoadTimer = setTimeout(() => {
                const isData = w1024Url.startsWith('data:');
                if (!isData) showHint("Loading HD photo...", true);

                const tempImg = new Image();
                tempImg.onload = () => {
                  if (inlineIdx === idx) {
                    const finalizeHdLoad = () => {
                        imgEl.src = hdUrl;
                        if (!isData) {
                            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || isIOS;
                            showHint(isMobile ? "HD photo is loaded. Long press image then Save to Photos" : "HD photo is loaded.");
                        }
                    };

                    if (isUserTouching) {
                      const waitTouch = setInterval(() => {
                        if (!isUserTouching) {
                          if (inlineIdx === idx) finalizeHdLoad();
                          clearInterval(waitTouch);
                        }
                      }, 100);
                    } else {
                      finalizeHdLoad();
                    }
                  }
                };
                tempImg.onerror = () => { if (!isData) showHint("Failed to load HD photo", false); };
                tempImg.src = hdUrl;
              }, 1000);
            };
          }, 20);
        }
      }, 150); 
    }

    function navigateInline(dir) { navigateInlineTo(inlineIdx + dir); }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; document.getElementById('l-img').src = ''; }

    function setupInlineTouch() {
      let lStartX = 0, lEndX = 0;
      const stage = document.getElementById('l-stage');
      
      stage.addEventListener('touchstart', e => { 
        lStartX = e.changedTouches[0].screenX; 
        isUserTouching = true; 
      }, {passive: true});
      
      stage.addEventListener('touchcancel', () => { 
        isUserTouching = false; 
      }, {passive: true});
      
      stage.addEventListener('touchend', e => { 
          lEndX = e.changedTouches[0].screenX; 
          isUserTouching = false;
          if (lStartX - lEndX > 50) navigateInline(1); 
          if (lEndX - lStartX > 50) navigateInline(-1); 
      }, {passive: true});
      
      window.addEventListener('keydown', (e) => { 
          if (document.getElementById('lightbox').style.display !== 'none') {
              if (e.key === 'ArrowRight') navigateInline(1); 
              else if (e.key === 'ArrowLeft') navigateInline(-1); 
              else if (e.key === 'Escape') closeLightbox(); 
          }
      });

      const track = document.getElementById('l-track'), timeB = document.getElementById('l-time'); 
      let isD = false, rAF = null;
      const calcScrub = (cX) => { 
          const rect = track.getBoundingClientRect(); 
          var pctFloat = Math.max(0, Math.min(cX - rect.left, rect.width)) / rect.width; 
          var targetIdx = Math.round(pctFloat * (window.filteredImages.length - 1));
          if (targetIdx !== inlineIdx) navigateInlineTo(targetIdx);
      }; 
      const hS = (cX) => { if(rAF) cancelAnimationFrame(rAF); rAF = requestAnimationFrame(() => calcScrub(cX)); };
      track.addEventListener('touchstart', e => { isD = true; timeB.style.opacity = 1; hS(e.touches[0].clientX); }, {passive: false}); 
      window.addEventListener('touchmove', e => { if (isD && document.getElementById('lightbox').style.display !== 'none') { e.preventDefault(); hS(e.touches[0].clientX); } }, {passive: false}); 
      window.addEventListener('touchend', () => { if (isD) { isD = false; timeB.style.opacity = 0; } }); 
      
      var wrapper = document.getElementById('l-filmstripWrapper');
      setTimeout(() => { 
          wrapper.addEventListener('scroll', () => { 
              if (isD || lIsProgrammatic || document.getElementById('lightbox').style.display === 'none') return; 
              
              let closestIdx = inlineIdx;
              let minDistance = Infinity;
              const wrapperRect = wrapper.getBoundingClientRect();
              const wCenter = wrapperRect.left + wrapperRect.width / 2;

              const thumbs = document.querySelectorAll('#l-filmstripWrapper .filmstrip-thumb');
              for (let i = 0; i < thumbs.length; i++) {
                  const rect = thumbs[i].getBoundingClientRect();
                  const distance = Math.abs(wCenter - (rect.left + rect.width / 2));
                  if (distance < minDistance) {
                      minDistance = distance;
                      closestIdx = i;
                  }
              }
              if (closestIdx !== inlineIdx) navigateInlineTo(closestIdx, true); 
          }); 
      }, 300);
    }
  </script>
</body>
</html>
