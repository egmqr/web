<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
  <link rel="preconnect" href="https://drive.google.com" crossorigin>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; 
      padding: 0; 
      background: #111; 
      color: white; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      padding-bottom: 80px; 
    }
    
    /* MODIFIED: Header stacked and styled for mobile priority */
    .header { 
      position: sticky; 
      top: 0; 
      background: rgba(17, 17, 17, 0.95); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px);
      padding: env(safe-area-inset-top, 15px) 15px 15px 15px; 
      z-index: 100; 
      border-bottom: 1px solid #333; 
      display: flex; 
      flex-direction: column; /* Stack title and buttons */
      gap: 15px;
    }
    h2 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
    
    .header-buttons { 
      display: flex; 
      gap: 10px; 
      width: 100%; 
    }
    
    .session-btn { 
      flex: 1; /* Makes buttons fill the row evenly */
      padding: 12px 10px; 
      border-radius: 12px; 
      border: none; 
      font-weight: 600; 
      font-size: 14px; 
      cursor: pointer; 
      transition: all 0.2s ease; 
    }
    .session-btn.idle { background: #4285f4; color: white; }
    .session-btn.active { background: #ea4335; color: white; animation: pulse 2s infinite; }
    
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(234, 67, 53, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); } }
    
    .feed-container { width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; display: flex; flex-direction: column; gap: 20px; }
    
    .card { 
      background: #1e1e1e; 
      border: 1px solid #333; 
      border-radius: 16px; 
      padding: 15px; 
      display: flex; 
      flex-direction: column; 
      gap: 15px; 
      animation: slideIn 0.4s ease-out forwards; 
      transition: opacity 0.3s, transform 0.3s;
    }
    
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .session-card { border: 2px solid #4285f4; transition: all 0.4s ease; }
    .session-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 10px; }
    .session-link { text-decoration: none; color: #4285f4; transition: opacity 0.2s; }
    .session-link:active { opacity: 0.6; }
    .session-title { font-size: 20px; font-weight: bold; margin: 0; display: flex; align-items: center; gap: 6px; }
    .session-title::after { content: '↗'; font-size: 14px; opacity: 0.7; }
    
    .session-items-container { display: flex; flex-direction: column; gap: 10px; }
    .photo-row { display: flex; gap: 15px; transition: all 0.3s ease; align-items: center; }
    
    /* MODIFIED: Larger Preview */
    .img-preview { 
      width: 120px; 
      height: 120px; 
      object-fit: cover; 
      border-radius: 12px; 
      border: 1px solid #444; 
      background: #000; 
      flex-shrink: 0; 
    }
    
    /* MODIFIED: Controls column aligns to the right for the delete button */
    .controls-col { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      flex-grow: 1; 
      align-items: flex-end; 
      justify-content: center;
    }
    
    /* MODIFIED: Delete button is smaller and pill-shaped */
    .delete-btn { 
      background: #ea4335; 
      color: white; 
      border: none; 
      border-radius: 20px; 
      font-weight: 600; 
      font-size: 13px;
      cursor: pointer; 
      transition: background 0.2s; 
      padding: 10px 18px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    } 
    
    .save-status { font-size: 11px; height: 14px; font-weight: bold; color: #0f9d58; margin-top: 2px; text-align: right; }
    
    .qr-section { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 5px; padding-top: 15px; border-top: 1px solid #333; }
    .qr-code, .qr-code-large { 
      width: 152px; 
      height: 152px; 
      background: white; 
      padding: 6px; 
      border-radius: 12px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      cursor: pointer; 
    }
    .qr-label { font-size: 12px; color: #888; font-weight: 600; letter-spacing: 0.5px; }
    
    #status { position: fixed; bottom: env(safe-area-inset-bottom, 20px); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 10px 24px; border-radius: 30px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; z-index: 1000; }
    .dot { width: 8px; height: 8px; background: #0f9d58; border-radius: 50%; transition: background 0.3s; }
    .dot.scanning { animation: blink 1s infinite; }
    @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
    .modal-box { background: #222; border-radius: 20px; padding: 25px; width: 85%; max-width: 320px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
  </style>
</head>
<body>

  <div class="header">
    <h2 id="boothHeader">Booth Feed</h2>
    <div class="header-buttons">
      <button id="pauseBtn" class="session-btn idle" style="background:#fbbc04; color:#000;" onclick="togglePause()">⏸ Pause</button>
      <button id="syncBtn" class="session-btn idle" style="background:#444;" onclick="manualSync()">🔄 Sync</button>
      <button id="sessionToggle" class="session-btn idle" onclick="toggleSession()">Start Session</button>
    </div>
  </div>

  <div id="feed" class="feed-container"></div>
  <div id="status"><div class="dot" id="status-dot"></div><span id="status-text">Connecting...</span></div>

  <div id="qrModal" class="modal-overlay" onclick="closeQR()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3 style="margin:0;">Scan to view</h3>
      <div id="enlarged-qr" style="width:250px; height:250px; background:white; padding:10px; border-radius:12px;"></div>
      <button class="modal-btn" style="background:#4285f4; color:white; width:100%; padding:15px; border-radius:12px; border:none; font-weight:bold; font-size:16px; margin-top:10px; cursor:pointer;" onclick="closeQR()">Done</button>
    </div>
  </div>

  <script>
    // 1. CONFIGURATION
    var BACKEND_URL = "https://script.google.com/macros/s/AKfycbzEUz2hwAYe3V5im0_jExevNjKGKUYzZqkJhVMCOWPy8TpvpYW_oIGYQEvJLbXd0dTQ/exec"; 
    var GITHUB_URL = new URL('gallery.html', window.location.href).href; 

    // 2. PARSE URL PARAMETERS
    const urlParams = new URLSearchParams(window.location.search);
    var TARGET_FOLDER_ID = urlParams.get('folderId'); 
    var BOOTH_NUM = urlParams.get('booth') || "1";

    document.getElementById('boothHeader').innerText = `Booth ${BOOTH_NUM} Feed`;

    var seenIds = {};
    var isSessionActive = false;
    var isPaused = false; 
    var pollTimer;
    
    var BASE_INTERVAL = 2000;         
    var MAX_ACTIVE_INTERVAL = 5000;   
    var MAX_IDLE_INTERVAL = 15000;    
    var currentInterval = BASE_INTERVAL;

    var INACTIVITY_LIMIT = 30 * 60 * 1000; 
    var lastActivityTime = Date.now();

    function resetActivityTimer() { lastActivityTime = Date.now(); }

    window.addEventListener('touchstart', resetActivityTimer, { passive: true });
    window.addEventListener('mousemove', resetActivityTimer, { passive: true });
    window.addEventListener('click', resetActivityTimer, { passive: true });
    window.addEventListener('keydown', resetActivityTimer, { passive: true });

    document.addEventListener("visibilitychange", function() {
      if (document.hidden) {
        clearTimeout(pollTimer);
        document.getElementById('status-text').innerText = "Paused (Background)";
        document.getElementById('status-dot').classList.remove('scanning');
      } else {
        if (!isPaused) {
          resetActivityTimer(); 
          currentInterval = BASE_INTERVAL; 
          checkDrive();
        }
      }
    });

    function start() { 
      if (!TARGET_FOLDER_ID) {
        document.getElementById('status-text').innerText = "Error: Missing Folder ID.";
        return;
      }
      
      fetch(`${BACKEND_URL}?api=getSessionState&folderId=${TARGET_FOLDER_ID}`)
        .then(res => res.json())
        .then(state => {
          isSessionActive = state.isActive;
          updateSessionUI();
        })
        .finally(() => checkDrive());
    }

    function togglePause(isAutoPause = false) {
      isPaused = !isPaused;
      var btn = document.getElementById('pauseBtn');
      var dot = document.getElementById('status-dot');
      var text = document.getElementById('status-text');

      if (isPaused) {
        clearTimeout(pollTimer);
        btn.innerText = "▶ Resume";
        btn.style.background = "#34a853"; 
        btn.style.color = "white";
        text.innerText = isAutoPause ? "Paused (Auto - 30m Inactive)" : "Paused (Manual)";
        dot.classList.remove('scanning');
        dot.style.background = "#fbbc04"; 
      } else {
        btn.innerText = "⏸ Pause";
        btn.style.background = "#fbbc04";
        btn.style.color = "#000";
        dot.style.background = "#0f9d58";
        resetActivityTimer(); 
        currentInterval = BASE_INTERVAL;
        checkDrive();
      }
    }
    
    function toggleSession() {
      var btn = document.getElementById('sessionToggle');
      var starting = !isSessionActive;
      
      btn.disabled = true;
      btn.innerText = starting ? "Starting..." : "Ending...";
      
      fetch(`${BACKEND_URL}?api=toggleSession&folderId=${TARGET_FOLDER_ID}&isStarting=${starting}`)
        .then(res => res.json())
        .then(data => {
          btn.disabled = false;
          isSessionActive = starting;
          updateSessionUI();
          if (isSessionActive && data.sessionNum) {
            createSessionCard(data.sessionNum);
            if (isPaused) togglePause();
          }
        });
    }

    function createSessionCard(sessionNum) {
      if (document.getElementById("session-card-" + sessionNum)) return;
      
      var galleryUrl = `${GITHUB_URL}?session=${sessionNum}&folderId=${TARGET_FOLDER_ID}&backend=${encodeURIComponent(BACKEND_URL)}`;
      var displayNum = sessionNum.replace('s', ''); 
      var feed = document.getElementById('feed');

      var div = document.createElement('div');
      div.className = "card session-card";
      div.id = "session-card-" + sessionNum;
      
      div.innerHTML = `
        <div class="session-header">
          <div style="display:flex; flex-direction:column; gap:8px; align-items:flex-start;">
            <a href="${galleryUrl}" target="_blank" class="session-link">
               <h3 class="session-title">Session ${displayNum}</h3>
            </a>
            <button class="delete-btn" style="padding:6px 14px; font-size:11px; background:#cc0000;" onclick="requestDeleteSession('${sessionNum}', this)">🗑 Delete Session</button>
          </div>
          <div class="qr-container" style="display:flex; flex-direction:column; align-items:center; gap:5px;">
            <div id="qr-session-${sessionNum}" class="qr-code" onclick="showLargeQR('${galleryUrl}')"></div>
            <span style="font-size:10px; color:#888; font-weight:bold;">CLIENT GALLERY</span>
          </div>
        </div>
        <div class="session-items-container" id="container-${sessionNum}"></div>
      `;
      
      feed.insertBefore(div, feed.firstChild);
      new QRCode(document.getElementById("qr-session-" + sessionNum), { text: galleryUrl, width: 140, height: 140, correctLevel: QRCode.CorrectLevel.L });
    }

    function updateSessionUI() {
      var btn = document.getElementById('sessionToggle');
      btn.className = isSessionActive ? "session-btn active" : "session-btn idle";
      btn.innerText = isSessionActive ? "End Session" : "Start Session";
    }
    
    function manualSync() {
      if (isPaused) { togglePause(); return; }
      var btn = document.getElementById('syncBtn');
      btn.innerText = "⏳ Syncing";
      clearTimeout(pollTimer);
      currentInterval = BASE_INTERVAL; 
      checkDrive();
      setTimeout(() => { btn.innerText = "🔄 Sync"; }, 1500); 
    }

    function checkDrive() {
      if (document.hidden || !TARGET_FOLDER_ID || isPaused) return; 

      if (Date.now() - lastActivityTime > INACTIVITY_LIMIT) {
        togglePause(true); 
        return;
      }
      
      document.getElementById('status-dot').classList.add('scanning');
      document.getElementById('status-text').innerText = "Syncing...";
      
      fetch(`${BACKEND_URL}?api=getRecentPhotos&folderId=${TARGET_FOLDER_ID}`)
        .then(res => res.json())
        .then(data => onSuccess(data.photos))
        .catch(err => onFailure(err));
    }
    
    function onSuccess(photos) {
      if (isPaused) return;
      document.getElementById('status-dot').classList.remove('scanning');
      document.getElementById('status-text').innerText = "Listening...";
      
      var foundNewPhotos = false;
      if (photos && photos.length > 0) {
        var newPhotos = [];
        for (var i = 0; i < photos.length; i++) {
          if (!seenIds[photos[i].id]) { 
            newPhotos.push(photos[i]); 
            seenIds[photos[i].id] = true; 
            foundNewPhotos = true;
          }
        }
        if (newPhotos.length > 0) {
          newPhotos.sort((a, b) => new Date(a.createdTime).getTime() - new Date(b.createdTime).getTime());
          newPhotos.forEach(p => routeCard(p));
        }
      }
      
      if (foundNewPhotos) {
        currentInterval = BASE_INTERVAL;
        resetActivityTimer(); 
      } else {
        currentInterval = isSessionActive ? Math.min(currentInterval + 1000, MAX_ACTIVE_INTERVAL) : Math.min(currentInterval + 2000, MAX_IDLE_INTERVAL);
      }
      
      clearTimeout(pollTimer);
      pollTimer = setTimeout(checkDrive, currentInterval); 
    }
    
    function onFailure(e) { 
      if (isPaused) return;
      document.getElementById('status-dot').classList.remove('scanning');
      document.getElementById('status-text').innerText = "Retrying...";
      clearTimeout(pollTimer);
      pollTimer = setTimeout(checkDrive, 5000);
    }
    
    function routeCard(photo) {
      var sessionMatch = photo.name.match(/-(s\d{3})(?:\.[a-zA-Z0-9]+)?$/);
      
      if (photo.needsSessionTag) {
        var nameParts = photo.name.split('.');
        var ext = nameParts.length > 1 ? '.' + nameParts.pop() : '';
        photo.name = nameParts.join('.') + "-" + photo.needsSessionTag + ext; 
        
        addSessionItem(photo, photo.needsSessionTag);
        triggerBackgroundTagging(photo.id, photo.needsSessionTag);
      } 
      else if (sessionMatch) addSessionItem(photo, sessionMatch[1]);
      else addSingleCard(photo);
    }

    function triggerBackgroundTagging(fileId, sessionStr) {
      var statusEl = document.getElementById('status-' + fileId);
      if(statusEl) { statusEl.innerText = "Tagging..."; statusEl.style.color = "#fbbc04"; }
      
      fetch(`${BACKEND_URL}?api=autoTagSession&folderId=${TARGET_FOLDER_ID}&fileId=${fileId}&sessionStr=${sessionStr}`)
        .then(res => res.json())
        .then(data => {
          if(statusEl) { 
            statusEl.innerText = "✓ Tagged"; 
            statusEl.style.color = "#0f9d58"; 
            setTimeout(() => { statusEl.innerText = ""; }, 3000); 
          }
        });
    }

    function addSessionItem(photo, sessionNum) {
      var cardId = "session-card-" + sessionNum;
      var sessionCard = document.getElementById(cardId);
      if (!sessionCard) createSessionCard(sessionNum);
      else document.getElementById('feed').insertBefore(sessionCard, document.getElementById('feed').firstChild);

      var itemData = generatePhotoHTML(photo);
      var itemRow = document.createElement('div');
      itemRow.className = "photo-row";
      itemRow.id = "item-" + photo.id;
      itemRow.style.paddingBottom = "15px";
      itemRow.style.borderBottom = "1px solid #333";
      itemRow.innerHTML = itemData.html;
      document.getElementById('container-' + sessionNum).prepend(itemRow);
    }

    function addSingleCard(photo) {
      var feed = document.getElementById('feed');
      var cleanUrl = photo.thumbUrl ? photo.thumbUrl.split('=')[0] : "https://drive.google.com/uc?id=" + photo.id; 
      var singleGalleryUrl = `${GITHUB_URL}?photo=${photo.id}&folderId=${TARGET_FOLDER_ID}&backend=${encodeURIComponent(BACKEND_URL)}`;
      
      var cardDiv = document.createElement('div');
      cardDiv.className = "card";
      cardDiv.id = "item-" + photo.id; 
      
      // Slick 2-column layout specifically for single cards
      cardDiv.innerHTML = `
        <div style="display: flex; justify-content: space-around; align-items: center; padding: 5px 0;">
          
          <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
            <img class="img-preview" id="img-${photo.id}" src="${cleanUrl}=w400" loading="lazy" style="width: 135px; height: 135px; margin: 0;">
            <button class="delete-btn" style="width: 135px; padding: 10px 0; border-radius: 12px;" onclick="requestDelete('${photo.id}', this)">🗑 Delete</button>
          </div>

          <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div id="qr-${photo.id}" class="qr-code-large" onclick="showLargeQR('${singleGalleryUrl}')" style="width: 135px; height: 135px; padding: 8px;"></div>
            <span class="qr-label">CLIENT VIEW</span>
          </div>

        </div>
      `;
      feed.insertBefore(cardDiv, feed.firstChild); 
      
      // Calculate exact QR size (135px container - 16px padding = 119px QR)
      new QRCode(document.getElementById("qr-" + photo.id), { text: singleGalleryUrl, width: 119, height: 119, correctLevel: QRCode.CorrectLevel.L });
    }

    function generatePhotoHTML(photo) {
      var cleanUrl = photo.thumbUrl ? photo.thumbUrl.split('=')[0] : "https://drive.google.com/uc?id=" + photo.id; 
      var singleGalleryUrl = `${GITHUB_URL}?photo=${photo.id}&folderId=${TARGET_FOLDER_ID}&backend=${encodeURIComponent(BACKEND_URL)}`;
      
      // Removed filename, increased image width, right-aligned smaller delete button
      var html = `
        <img class='img-preview' id='img-${photo.id}' src='${cleanUrl}=w400' loading="lazy">
        <div class='controls-col'>
          <button class='delete-btn' onclick='requestDelete("${photo.id}", this)'>🗑 Delete</button>
          <div class='save-status' id='status-${photo.id}'></div>
        </div>
      `;
      return { html: html, singleGalleryUrl: singleGalleryUrl };
    }

    function requestDelete(fId, btnEl) {
      if (btnEl.innerText !== "Sure?") {
        btnEl.innerText = "Sure?"; 
        btnEl.style.background = "#880000"; 
        setTimeout(() => { 
          if (btnEl && btnEl.innerText === "Sure?") { 
            btnEl.innerText = "🗑 Delete"; 
            btnEl.style.background = "#ea4335"; 
          } 
        }, 4000);
        return; 
      }
      
      var itemRow = document.getElementById('item-' + fId);
      if (itemRow) {
        itemRow.style.opacity = "0";
        itemRow.style.transform = "scale(0.9)";
        setTimeout(() => itemRow.remove(), 300);
      }
      seenIds[fId] = "DELETED"; 

      fetch(`${BACKEND_URL}?api=delete&folderId=${TARGET_FOLDER_ID}&fileId=${fId}`)
        .then(res => res.json())
        .catch(err => console.error("Deletion failed:", err));
    }

    function requestDeleteSession(sessionNum, btnEl) {
      if (btnEl.innerText !== "Are you sure? (Deletes ALL photos)") {
        var oldText = btnEl.innerText;
        btnEl.innerText = "Are you sure? (Deletes ALL photos)"; btnEl.style.background = "#880000";
        setTimeout(() => { if (btnEl && btnEl.innerText === "Are you sure? (Deletes ALL photos)") { btnEl.innerText = oldText; btnEl.style.background = "#cc0000"; } }, 5000);
        return;
      }
      
      var card = document.getElementById('session-card-' + sessionNum);
      if (card) {
        card.style.opacity = "0";
        card.style.transform = "scale(0.95)";
        setTimeout(() => card.remove(), 400);
      }
      
      fetch(`${BACKEND_URL}?api=deleteSession&folderId=${TARGET_FOLDER_ID}&sessionStr=${sessionNum}`)
        .then(res => res.json())
        .then(() => {
          clearTimeout(pollTimer); 
          start();
        });
    }

    function showLargeQR(url) { 
      var container = document.getElementById('enlarged-qr');
      container.innerHTML = ""; 
      new QRCode(container, { text: url, width: 230, height: 230, correctLevel: QRCode.CorrectLevel.L });
      document.getElementById('qrModal').style.display = 'flex'; 
    }
    
    function closeQR() { document.getElementById('qrModal').style.display = 'none'; }
    window.onload = () => setTimeout(start, 500);
  </script>
</body>
</html>
