<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Client Gallery</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; color: white; font-family: -apple-system, sans-serif; }
    
    .landing-page { padding: 20px; text-align: center; max-width: 800px; margin: 0 auto; }
    .landing-page h2 { font-size: 24px; font-weight: 600; margin-bottom: 20px; color: #fff; }
    .thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 30px; }
    .thumb-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid #333; background: #222; }
    
    .loader-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 60px; gap: 15px; width: 100%; }
    .focus-ring { width: 44px; height: 44px; border: 3px solid rgba(66, 133, 244, 0.15); border-top: 3px solid #4285f4; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite; }
    .loader-text { color: #aaa; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; animation: pulse-text 1.5s ease-in-out infinite; }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulse-text { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: #000; z-index: 9999; display: none; flex-direction: column; align-items:center; justify-content:center; overflow:hidden; }
    .popout-close { position: absolute; top: max(40px, env(safe-area-inset-top)); right: max(20px, env(safe-area-inset-right)); width: 44px; height: 44px; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 99999; color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.4); } 
    .download-action { position: absolute; top: max(40px, env(safe-area-inset-top)); left: max(20px, env(safe-area-inset-left)); height: 44px; padding: 0 20px; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: bold; z-index: 99999; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.4); }
    
    .image-stage { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; } 
    
    /* ADDED: -webkit-touch-callout: default to guarantee iOS native saving works perfectly */
    img.main { width: 85%; height: 85%; transition: all 0.3s ease; opacity:0; object-fit: contain; pointer-events: auto; user-select: none; -webkit-user-drag: none; -webkit-touch-callout: default; } 
    
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 10; color: #fff; cursor: pointer; } 
    .left { left: max(10px, env(safe-area-inset-left)); } .right { right: max(10px, env(safe-area-inset-right)); } 
    .modal-bottom-controls { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 20; padding-top: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); } 
    .filmstrip-wrapper { position: relative; width: 100%; overflow-x: auto; white-space: nowrap; -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); padding: 10px calc(50% - 26px); scroll-snap-type: x mandatory; box-sizing: border-box; } 
    .filmstrip-wrapper::-webkit-scrollbar { display: none; } 
    .filmstrip-thumb { width: 45px; height: 45px; object-fit: cover; display: inline-block; margin: 0 4px; border-radius: 6px; opacity: 0.4; border: 2px solid transparent; transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); scroll-snap-align: center; background-color: #222; cursor: pointer; transform-origin: center center; } 
    .filmstrip-thumb.active { opacity: 1; transform: scale(1.25); border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.4); z-index: 2; position: relative; } 
    .scrubber-track { width: 90%; max-width: 500px; height: 50px; display: flex; align-items: center; position: relative; touch-action: none; } 
    .track-line { width: 100%; height: 4px; background: #444; border-radius: 2px; } 
    .scrubber-handle { width: 24px; height: 24px; background: #fff; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 2px 8px rgba(0,0,0,0.6); pointer-events: none; } 
    .time-bubble { position: absolute; top: -30px; transform: translateX(-50%); background: #333; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  </style>
</head>
<body>

  <div class="landing-page">
    <h2>Session <span id="session-title-display"></span></h2>
    <div id="loader" class="loader-wrapper">
      <div class="focus-ring"></div>
      <div class="loader-text">Fetching Photos</div>
    </div>
    <div id="thumb-grid" class="thumb-grid"></div>
  </div>

  <div id="lightbox" class="lightbox">
    <a id="l-download-btn" class="download-action" href="" download>⬇ Download</a>
    <div class="popout-close" onclick="closeLightbox()">✕</div>
    
    <div class="image-stage" id="l-stage">
      <div class="nav-btn left" onclick="navigateInline(-1)">&#10094;</div>
      <img id="l-img" class="main" src="" onload="this.style.opacity=1">
      <div class="nav-btn right" onclick="navigateInline(1)">&#10095;</div>
    </div>
    
    <div class="modal-bottom-controls">
      <div id="l-count" style="font-size:12px; color:#aaa; font-weight:bold;"></div>
      <div class="filmstrip-wrapper" id="l-filmstripWrapper"></div>
      <div class="scrubber-track" id="l-track">
        <div class="time-bubble" id="l-time"></div>
        <div class="track-line"></div>
        <div class="scrubber-handle" id="l-handle"></div>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const SESSION_NUM = urlParams.get('session');
    const DYNAMIC_BACKEND = urlParams.get('backend'); 
    const GAS_WEB_APP_URL = DYNAMIC_BACKEND ? DYNAMIC_BACKEND : "https://script.google.com/macros/s/YOUR_PRIMARY_SCRIPT_ID/exec"; 

    if (SESSION_NUM) {
      document.getElementById('session-title-display').innerText = SESSION_NUM.replace('s', '');
    }
    
    window.filteredImages = [];
    var inlineIdx = 0;            
    var lIsProgrammatic = false;
    var imageLoadTimer = null; 
    var hdLoadTimer = null; // New timer for progressive HD loading

    window.onload = function() {
      if (!SESSION_NUM) {
        document.getElementById('loader').innerHTML = "<div class='loader-text'>No session specified</div>";
        return;
      }

      fetch(`${GAS_WEB_APP_URL}?api=gallery&session=${SESSION_NUM}`)
        .then(response => response.json())
        .then(result => {
          if (result.status === 'success') {
            setupLandingPage(result.data);
          } else {
            document.getElementById('loader').innerHTML = "<div class='loader-text' style='color:#ea4335;'>Error: " + result.message + "</div>";
          }
        })
        .catch(err => {
          document.getElementById('loader').innerHTML = "<div class='loader-text' style='color:#ea4335;'>Failed to load photos</div>";
          console.error(err);
        });

      setupInlineTouch(); 
    };

    function setupLandingPage(photos) {
      document.getElementById('loader').style.display = 'none';
      if (!photos || photos.length === 0) {
        document.getElementById('thumb-grid').innerHTML = "<div class='loader-wrapper'><div class='loader-text'>No photos ready yet. Check back soon!</div></div>";
        return;
      }

      window.filteredImages = photos.map(function(p) { return { baseUrl: p.baseUrl, displayTime: p.displayTime, downloadUrl: p.downloadUrl }; });

      var gridHtml = "";
      photos.forEach(function(p, index) { 
        gridHtml += "<img src='" + p.previewUrl + "' loading='lazy' decoding='async' onclick='openInlineCarousel(" + index + ")' style='cursor:pointer; transition: opacity 0.2s;' onmouseover='this.style.opacity=0.8' onmouseout='this.style.opacity=1'>"; 
      });
      document.getElementById('thumb-grid').innerHTML = gridHtml;
    }

    // ==========================================
    // UNIFIED INLINE SCRUBBER FUNCTIONS
    // ==========================================
    function openInlineCarousel(idx) {
      inlineIdx = idx;
      document.getElementById('lightbox').style.display = 'flex';
      
      var stripHtml = '';
      window.filteredImages.forEach((f, i) => { 
        var src = f.baseUrl.startsWith('data:') ? f.baseUrl : f.baseUrl + '=s50-c';
        stripHtml += '<img id="lt-'+i+'" class="filmstrip-thumb ' + (i === idx ? 'active' : '') + '" src="'+src+'" loading="lazy" decoding="async" onclick="navigateInlineTo('+i+')">'; 
      });
      document.getElementById('l-filmstripWrapper').innerHTML = stripHtml;
      
      navigateInlineTo(idx);
      setTimeout(() => { 
        var itl = document.getElementById('lt-' + idx); 
        if (itl) itl.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); 
      }, 50);
    }

    function navigateInlineTo(idx, fromFilmstripScroll = false) {
      if (idx < 0 || idx >= window.filteredImages.length) return;
      inlineIdx = idx;
      const img = window.filteredImages[idx];
      
      const pct = window.filteredImages.length > 1 ? (idx / (window.filteredImages.length - 1)) * 100 : 0;
      
      document.getElementById('l-handle').style.left = pct + '%'; 
      var timeB = document.getElementById('l-time');
      timeB.style.left = pct + '%'; timeB.innerText = img.displayTime; 
      document.getElementById('l-count').innerText = `${idx + 1} / ${window.filteredImages.length}`; 
      document.getElementById('l-download-btn').href = img.downloadUrl;
      
      document.querySelectorAll('#l-filmstripWrapper .filmstrip-thumb.active').forEach(el => el.classList.remove('active')); 
      const active = document.getElementById('lt-' + idx); 
      
      if (active) { 
        active.classList.add('active'); 
        if (!fromFilmstripScroll) {
          lIsProgrammatic = true; 
          document.getElementById('l-filmstripWrapper').style.scrollBehavior = 'auto'; 
          active.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); 
          setTimeout(() => { lIsProgrammatic = false; }, 150); 
        }
      }
      
      // Clear both timers to prevent fetching outdated images if swiping fast
      clearTimeout(imageLoadTimer);
      clearTimeout(hdLoadTimer);
      
      const w1024Url = img.baseUrl.startsWith('data:') ? img.baseUrl : img.baseUrl + '=w1024';
      const hdUrl = img.baseUrl.startsWith('data:') ? img.baseUrl : img.baseUrl + '=s0';
      const imgEl = document.getElementById('l-img');
      
      imageLoadTimer = setTimeout(() => {
        // If it isn't the preview and isn't the HD, we need to load a new image
        if (imgEl.src !== w1024Url && imgEl.src !== hdUrl) {
          imgEl.style.opacity = 0; 
          setTimeout(() => { 
            imgEl.src = w1024Url; 
            imgEl.onload = () => {
              imgEl.style.opacity = 1; 
              
              // NEW: Progressive HD Preloading
              // After the fast preview is visible, wait 1 second then silently fetch the uncompressed file.
              hdLoadTimer = setTimeout(() => {
                const tempImg = new Image();
                tempImg.onload = () => {
                  // Only swap if the user hasn't swiped away while downloading
                  if (inlineIdx === idx) {
                    imgEl.src = hdUrl;
                  }
                };
                tempImg.src = hdUrl;
              }, 1000);
              
            };
          }, 20);
        }
      }, 150); 
    }

    function navigateInline(dir) { navigateInlineTo(inlineIdx + dir); }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; document.getElementById('l-img').src = ''; }

    function setupInlineTouch() {
      let lStartX = 0, lEndX = 0;
      const stage = document.getElementById('l-stage');
      stage.addEventListener('touchstart', e => { lStartX = e.changedTouches[0].screenX; }, {passive: true});
      stage.addEventListener('touchend', e => { 
          lEndX = e.changedTouches[0].screenX; 
          if (lStartX - lEndX > 50) navigateInline(1); 
          if (lEndX - lStartX > 50) navigateInline(-1); 
      }, {passive: true});
      
      window.addEventListener('keydown', (e) => { 
          if (document.getElementById('lightbox').style.display !== 'none') {
              if (e.key === 'ArrowRight') navigateInline(1); 
              else if (e.key === 'ArrowLeft') navigateInline(-1); 
              else if (e.key === 'Escape') closeLightbox(); 
          }
      });

      const track = document.getElementById('l-track'), timeB = document.getElementById('l-time'); 
      let isD = false, rAF = null;
      const calcScrub = (cX) => { 
          const rect = track.getBoundingClientRect(); 
          var pctFloat = Math.max(0, Math.min(cX - rect.left, rect.width)) / rect.width; 
          var targetIdx = Math.round(pctFloat * (window.filteredImages.length - 1));
          if (targetIdx !== inlineIdx) navigateInlineTo(targetIdx);
      }; 
      const hS = (cX) => { if(rAF) cancelAnimationFrame(rAF); rAF = requestAnimationFrame(() => calcScrub(cX)); };
      track.addEventListener('touchstart', e => { isD = true; timeB.style.opacity = 1; hS(e.touches[0].clientX); }, {passive: false}); 
      window.addEventListener('touchmove', e => { if (isD && document.getElementById('lightbox').style.display !== 'none') { e.preventDefault(); hS(e.touches[0].clientX); } }, {passive: false}); 
      window.addEventListener('touchend', () => { if (isD) { isD = false; timeB.style.opacity = 0; } }); 
      
      var wrapper = document.getElementById('l-filmstripWrapper');
      setTimeout(() => { 
          wrapper.addEventListener('scroll', () => { 
              if (isD || lIsProgrammatic || document.getElementById('lightbox').style.display === 'none') return; 
              
              let closestIdx = inlineIdx;
              let minDistance = Infinity;
              const wrapperRect = wrapper.getBoundingClientRect();
              const wCenter = wrapperRect.left + wrapperRect.width / 2;

              const thumbs = document.querySelectorAll('#l-filmstripWrapper .filmstrip-thumb');
              for (let i = 0; i < thumbs.length; i++) {
                  const rect = thumbs[i].getBoundingClientRect();
                  const distance = Math.abs(wCenter - (rect.left + rect.width / 2));
                  if (distance < minDistance) {
                      minDistance = distance;
                      closestIdx = i;
                  }
              }
              if (closestIdx !== inlineIdx) navigateInlineTo(closestIdx, true); 
          }); 
      }, 300);
    }
  </script>
</body>
</html>
